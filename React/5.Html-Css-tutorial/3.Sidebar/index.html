<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Dashboard Sidebar Menu | Dark_light Mode</title>
  </head>
  <body>
    <nav class="sidebar">
      <header>
        <div class="image-text">
          <span class="image"
            ><img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZgCo1yvYBuVYibOKdojgBG_tMcwBM4kleEfEy-kxtUdF2JvYcIjv7LKr2&s=10"
              alt=""
          /></span>
          <div class="text header-text">
            <span class="name">ZarkCode</span>
            <span class="profession">Fullstack Developer</span>
          </div>
        </div>

        <i class="toggle"></i>
      </header>

      <div class="menu-bar">
        <div class="menu">
          <li class="nav-link">
            <i class="icon"></i>
            <input type="search" placeholder="Search..." />
          </li>
          <ul class="menu-links">
            <li class="nav-link">
              <a href="#">
                <i class="icon"></i>
                <span class="text nav-text">Dashboard</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </body>
</html>
